name: Issue Triage (AI)

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: string

concurrency:
  group: issue-triage-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage with GitHub Models
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      models: read

    steps:
      - name: Triage issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title || 'Test issue' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          title = os.environ["ISSUE_TITLE"]
          body = os.environ["ISSUE_BODY"]
          issue_number = os.environ["ISSUE_NUMBER"]
          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]

          prompt = f"""You are a triage bot for rust-ui, a Leptos (Rust) UI component library.

A new GitHub issue was opened:

Title: {title}

Body:
{body}

Write a short, friendly comment (3-5 sentences) that:
- Acknowledges the issue and classifies it (bug, feature request, demo issue, question, etc.)
- Suggests a next step or workaround if obvious
- Is concise and helpful

End your comment with: *🤖 This comment was auto-generated by a triage bot.*"""

          # Call GitHub Models API (free, no billing needed)
          req = urllib.request.Request(
              "https://models.inference.ai.azure.com/chat/completions",
              data=json.dumps({
                  "model": "gpt-4o-mini",
                  "messages": [{"role": "user", "content": prompt}],
                  "max_tokens": 512,
              }).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              }
          )
          response = json.loads(urllib.request.urlopen(req).read())
          comment = response["choices"][0]["message"]["content"]

          # Post comment to GitHub
          req2 = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}/comments",
              data=json.dumps({"body": comment}).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              }
          )
          urllib.request.urlopen(req2)
          print("Comment posted successfully.")
          EOF
