name: Issue Triage (AI)

# Disabled until Anthropic API credits are added.
# To enable: remove the `if: false` line from the job below.
# API key setup: GitHub repo → Settings → Secrets → ANTHROPIC_API_KEY
#
# Tested and working — only blocked by credit balance.

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: string

concurrency:
  group: issue-triage-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage with Claude
    runs-on: ubuntu-latest
    if: false # Remove this line to enable
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          claude_args: --model claude-haiku-4-5-20251001 --allowedTools "Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue edit:*),Bash(gh label list:*),Read,Glob,Grep"
          prompt: |
            You are a triage bot for rust-ui — a Leptos (Rust) UI component library at https://rust-ui.com.

            **Issue:** #${{ github.event.issue.number || inputs.issue_number }}
            **Title:** ${{ github.event.issue.title || 'See issue details below' }}
            **Author:** @${{ github.event.issue.user.login || 'See issue' }}

            ## Steps

            1. Read the full issue:
               gh issue view ${{ github.event.issue.number || inputs.issue_number }}

            2. Search for duplicates:
               gh issue list --search "<keywords>" --state all --limit 20

            3. Get available labels:
               gh label list --json name,description --limit 100

            4. Apply appropriate labels:
               gh issue edit ${{ github.event.issue.number || inputs.issue_number }} --add-label "label1,label2"

            ## Your comment

            Post a single, concise comment (3-5 sentences) that:
            - Acknowledges the issue and classifies it (bug, feature request, demo issue, question, etc.)
            - Links to any duplicate issues found
            - Suggests a next step or workaround if obvious
            - Ends with: *🤖 This comment was auto-generated by a triage bot.*

            Be friendly and direct. Do not be formulaic.
