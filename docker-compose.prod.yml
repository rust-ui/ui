services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: always
    networks:
      - app-network

  app:
    image: ${APP_IMAGE}
    expose:
      - "3000"
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
