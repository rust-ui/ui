<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust UI - Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #09090b;
            color: #fafafa;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            background: #27272a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg {
            width: 32px;
            height: 32px;
            stroke: #a1a1aa;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        p {
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        .retry-btn {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: #fafafa;
            color: #09090b;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .retry-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h.01"/>
                <path d="M8.5 16.429a5 5 0 0 1 7 0"/>
                <path d="M5 12.859a10 10 0 0 1 5.17-2.69"/>
                <path d="M19 12.859a10 10 0 0 0-2.007-1.523"/>
                <path d="M2 8.82a15 15 0 0 1 4.177-2.643"/>
                <path d="M22 8.82a15 15 0 0 0-11.288-3.764"/>
                <path d="m2 2 20 20"/>
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>Rust UI requires an internet connection to display the latest documentation and components.</p>
        <p>Please check your connection and try again.</p>
        <button class="retry-btn" onclick="location.href='https://rust-ui.com'">Retry Connection</button>
    </div>
    <script>
        // Auto-retry when back online
        window.addEventListener('online', () => {
            location.href = 'https://rust-ui.com';
        });
    </script>
</body>
</html>
