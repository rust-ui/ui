[build]
jobs = 8  # M1 Pro: 8 cores, 16 GB RAM

[target.aarch64-apple-darwin]
linker = "clang"
rustflags = [
    "-C", "symbol-mangling-version=v0",
    "-C", "link-arg=-fuse-ld=lld",  # lld linker: much faster than Apple's ld for dev
    "--cfg", "erase_components"
]

# WebAssembly target
[target.wasm32-unknown-unknown]
rustflags = [
    "--cfg", "getrandom_backend=\"wasm_js\"",
    "--cfg", "erase_components"
]

# Native Linux binary (glibc, used on Hetzner/production servers)
# ⚠️  CRITICAL: erase_components MUST be set here too.
# If server (x86_64-linux-gnu) builds WITHOUT erase_components but WASM builds WITH it,
# SSR outputs component boundary comment markers that the WASM client doesn't expect →
# tachys failed_to_cast_marker_node panic on every page. Always keep in sync with wasm target.
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "--cfg", "erase_components"
]

# Statically linked Linux binary (NO mold)
[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "--cfg", "erase_components"
]
# linker = "musl-gcc" # 👉 This seems to cause issues cause I had dynamic when doing file ./target/x86_64-unknown-linux-musl/release/server, and we are supposed to have static for MUSL.




[unstable]
codegen-backend = true
